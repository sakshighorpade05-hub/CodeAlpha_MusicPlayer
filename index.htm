<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="player">

    <!-- Album Cover -->
    <div class="cover">
        <img id="cover" src="images/cover1.jpg" alt="Cover">
    </div>

    <!-- Song Details -->
    <div class="details">
        <h2 id="title">Song Title</h2>
        <h4 id="artist">Artist Name</h4>
    </div>

    <!-- Progress -->
    <div class="progress-container">

        <span id="currentTime">0:00</span>

        <input
            type="range"
            id="progress"
            min="0"
            max="100"
            value="0">

        <span id="duration">0:00</span>

    </div>

    <!-- Controls -->
    <div class="controls">

        <button id="prev">
            <i class="fa-solid fa-backward"></i>
        </button>

        <button id="play">
            <i class="fa-solid fa-play"></i>
        </button>

        <button id="next">
            <i class="fa-solid fa-forward"></i>
        </button>

    </div>

    <!-- Volume -->

    <div class="volume">

        <i class="fa-solid fa-volume-high"></i>

        <input
        type="range"
        id="volume"
        min="0"
        max="1"
        step="0.1"
        value="1">

    </div>

    <!-- Playlist -->

    <div class="playlist">

        <h3>Playlist</h3>

        <ul id="playlist">

            <li data-index="0">🎵 Song 1</li>
            <li data-index="1">🎵 Song 2</li>
            <li data-index="2">🎵 Song 3</li>

        </ul>

    </div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
